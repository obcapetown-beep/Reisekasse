  <script type="text/babel">

const { useState, useEffect, useMemo } = React;

// ── Firebase ─────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyAH574JePsJAaq3Am-jlQd525hcWcEzpFg",

// ── Data ─────────────────────────────────────────────────────────
const CURRENCIES = [
  { code:"EUR", symbol:"€",  name:"Euro",                 rate:1        },
  { code:"VND", symbol:"₫",  name:"Vietnamesischer Dong", rate:0.000038 },
  { code:"ZAR", symbol:"R",  name:"Südafrik. Rand",       rate:0.051    },
  { code:"PLN", symbol:"zł", name:"Polnischer Zloty",     rate:0.232    },
  { code:"USD", symbol:"$",  name:"US-Dollar",            rate:0.92     },
  { code:"GBP", symbol:"£",  name:"Britisches Pfund",     rate:1.17     },

const SEED_TRIPS = [

const SEED_ENTRIES = {

ils",payer:"Graben",amount:840},{desc:"Bach Ma Auto",payer:"Graben",amount:100},{desc:"Einkauf Ninh Binh",payer:"Graben",amount:350},{desc:"Eintritt",payer:"Graben",amount:340},{desc:"Smoothies Fluss",payer:"Graben",amount:700},{desc:"Getränke",payer:"Graben",amount:268},{desc:"Abendessen Hotpot",payer:"Graben",amount:1600},{desc:"Kaffee Halong",payer:"Graben",amount:770},{desc:"Essen Halong",payer:"Graben",amount:1300},{desc:"Getränke Hafen",payer:"Graben",amount:360},{desc:"Drinks Boot",payer:"Graben",amount:460},{desc:"Bier Boot",payer:"Graben",amount:200},{desc:"Getränke Inseln",payer:"Graben",amount:360},{desc:"Essen Hanoi",payer:"Graben",amount:1400},{desc:"Fahrt Halong",payer:"Graben",amount:300},{desc:"Trainstreet",payer:"Graben",amount:500},{desc:"Frühstück",payer:"Graben",amount:700},{desc:"Cocktail",payer:"Graben",amount:1100},{desc:"Harry Potter Cafe",payer:"Graben",amount:485},{desc:"Abendessen",payer:"Graben",amount:1200},{desc:"Moon Cactus",payer:"Graben",amount:5515},{desc:"Abendessen",payer:"Graben",amount:500},
    {desc:"Essen",payer:"Bergmann",amount:610},{desc:"Bier",payer:"Bergmann",amount:150},{desc:"Starbucks",payer:"Bergmann",amount:535},{desc:"Fahrt",payer:"Bergmann",amount:800},{desc:"Auto",payer:"Bergmann",amount:800},{desc:"Wäscherei",payer:"Bergmann",amount:400},{desc:"Frühstück",payer:"Bergmann",amount:1100},{desc:"Abendessen",payer:"Bergmann",amount:1370},{desc:"Flug Gebühr",payer:"Bergmann",amount:65},{desc:"Frühstück",payer:"Bergmann",amount:100},{desc:"Übernachtung Phu Quoc",payer:"Bergmann",amount:5260},{desc:"Bus Da Nang",payer:"Bergmann",amount:450},{desc:"Übernachtung Da Nang",payer:"Bergmann",amount:4500},{desc:"Scooter",payer:"Bergmann",amount:720},
  ],
  suedafrika:[
    {desc:"Flug JHB-CPT",payer:"Graben",amount:730},{desc:"Flug CPT-JHB",payer:"Graben",amount:585},{desc:"Auto",payer:"Graben",amount:390},{desc:"Haus",payer:"Graben",amount:500},{desc:"Spar",payer:"Graben",amount:30},{desc:"Tops Getränke",payer:"Graben",amount:130},{desc:"Tops Getränke",payer:"Graben",amount:56},
    {desc:"Einkauf Frühstück",payer:"Bergmann",amount:54},{desc:"Einkauf Grillen",payer:"Bergmann",amount:55},{desc:"Foodlovers",payer:"Bergmann",amount:114},{desc:"Spar",payer:"Bergmann",amount:17},{desc:"Woolies",payer:"Bergmann",amount:118},{desc:"Dunes",payer:"Bergmann",amount:79},{desc:"Ostersachen",payer:"Bergmann",amount:25},
  ],
  polen:[
    {desc:"Übernachtung 1",payer:"Graben",amount:71},{desc:"Einkauf",payer:"Graben",amount:140},{desc:"Camping Leba",payer:"Graben",amount:145},{desc:"Camping Danzig",payer:"Graben",amount:55},{desc:"Lidl 1",payer:"Graben",amount:84},{desc:"Räder",payer:"Graben",amount:17},{desc:"Lidl Danzig",payer:"Graben",amount:217},{desc:"Kebap Leba",payer:"Graben",amount:73},{desc:"Bootsfahrt",payer:"Graben",amount:93},{desc:"Lidl Ilawa",payer:"Graben",amount:66},{desc:"Camping Ilawa",payer:"Graben",amount:368},{desc:"Camping Natur",payer:"Graben",amount:100},{desc:"Essen",payer:"Graben",amount:130},{desc:"Frühstück Kinder",payer:"Graben",amount:40},{desc:"Essen Kaunas",payer:"Graben",amount:85},{desc:"Lidl",payer:"Graben",amount:110},{desc:"Wohnung Kaunas",payer:"Graben",amount:115},{desc:"Penny Gauting",payer:"Graben",amount:97},{desc:"Essen Riga",payer:"Graben",amount:175},{desc:"Einkauf Strand",payer:"Graben",amount:32},{desc:"Camping Kolka",payer:"Graben",amount:85},{desc:"Einkauf Kuldiga",payer:"Graben",amount:70},{desc:"Einkauf Strand",payer:"Graben",amount:105},{desc:"Einkauf",payer:"Graben",amount:43},{desc:"Snacks Ljepaja",payer:"Graben",amount:40},{desc:"Kaffee Fähre",payer:"Graben",amount:30},{desc:"Brötchen HH",payer:"Graben",amount:28},{desc:"Camping Rügen",payer:"Graben",amount:56},
    {desc:"Übernachtung 1",payer:"Bergmann",amount:46},{desc:"Camping 1",payer:"Bergmann",amount:80},{desc:"Camping Leba",payer:"Bergmann",amount:84},{desc:"Kebap",payer:"Bergmann",amount:20},{desc:"Einkauf Oli & Tom",payer:"Bergmann",amount:91},{desc:"Erster Einkauf",payer:"Bergmann",amount:100},{desc:"Bier Tretboot",payer:"Bergmann",amount:14},{desc:"Einkauf Fisch",payer:"Bergmann",amount:20},{desc:"Essen Firewood",payer:"Bergmann",amount:25},{desc:"Bäckerei",payer:"Bergmann",amount:11},{desc:"Camping Kuldiga",payer:"Bergmann",amount:90},{desc:"Einkauf Fähre",payer:"Bergmann",amount:60},
  ],
};

async function seedIfEmpty() {
  const snap = await db.collection("trips").get();
  if (!snap.empty) return;
  for (const t of SEED_TRIPS) {
    await db.collection("trips").doc(t.id).set({ name:t.name, currency:t.currency, family1:t.family1, family2:t.family2, order:t.order });
    for (const e of (SEED_ENTRIES[t.id]||[])) {
      await db.collection("trips").doc(t.id).collection("entries").add({ ...e, createdAt: Date.now() });
    }
  }
}

function getCur(code, rates) {
  const base = CURRENCIES.find(c=>c.code===code)||CURRENCIES[0];
  return { ...base, rate: rates[code]??base.rate };
}
function fmtEuro(n) { return n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; }
function fmtNum(n)  { return n.toLocaleString("de-DE",{maximumFractionDigits:0}); }

const GOLD="#d4af37", BG="#0a1520";
const inp = { width:"100%", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(212,175,55,0.25)", borderRadius:12, color:"#f0e4c8", padding:"16px 18px", fontSize:18, outline:"none" };
const lbl = { display:"block", fontSize:11, letterSpacing:2, color:"#7a6a5a", textTransform:"uppercase", marginBottom:8 };

function App() {
  const [trips, setTrips]         = useState([]);
  const [entries, setEntries]     = useState({});
  const [activeIdx, setActiveIdx] = useState(0);
  const [loading, setLoading]     = useState(true);
  const [syncDot, setSyncDot]     = useState(false);
  const [view, setView]           = useState("home");
  const [rates, setRates]         = useState(Object.fromEntries(CURRENCIES.map(c=>[c.code,c.rate])));
  const [editRates, setEditRates] = useState(false);
  const [newName, setNewName]     = useState("");
  const [newCur, setNewCur]       = useState("EUR");
  const [newF1, setNewF1]         = useState("");
  const [newF2, setNewF2]         = useState("");
  const [newDesc, setNewDesc]     = useState("");
  const [newAmt, setNewAmt]       = useState("");
  const [newPayer, setNewPayer]   = useState("f1");

  useEffect(()=>{
    seedIfEmpty().then(()=>{
      db.collection("trips").onSnapshot(snap=>{
        const t = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order??0)-(b.order??0));
        setTrips(t); setLoading(false); flash();
      });
    });
  },[]);

  useEffect(()=>{
    if (!trips.length) return;
    const unsubs = trips.map(t=>
      db.collection("trips").doc(t.id).collection("entries").onSnapshot(snap=>{
        const es = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.createdAt??0)-(b.createdAt??0));
        setEntries(prev=>({...prev,[t.id]:es})); flash();
      })
    );
    return ()=>unsubs.forEach(u=>u());
  },[trips.map(t=>t.id).join(",")]);

  function flash(){ setSyncDot(true); setTimeout(()=>setSyncDot(false),800); }

  const trip        = trips[activeIdx]||null;
  const tripEntries = trip?(entries[trip.id]||[]):[];
  const cur         = trip?getCur(trip.currency,rates):CURRENCIES[0];

  const stats = useMemo(()=>{
    if (!trip) return null;
    let t1=0,t2=0;
    tripEntries.forEach(e=>{ if(e.payer===trip.family1) t1+=e.amount; else t2+=e.amount; });
    const total=t1+t2, diff1Euro=(t1-total/2)*cur.rate;
    return {t1,t2,total,diff1Euro};
  },[trip,tripEntries,cur.rate]);

  async function addEntry(){
    if (!newDesc.trim()||!newAmt||!trip) return;
    const payer=newPayer==="f1"?trip.family1:trip.family2;
    await db.collection("trips").doc(trip.id).collection("entries").add({desc:newDesc.trim(),payer,amount:parseFloat(newAmt),createdAt:Date.now()});
    setNewDesc(""); setNewAmt("");
  }

  async function delEntry(tripId,entryId){
    await db.collection("trips").doc(tripId).collection("entries").doc(entryId).delete();
  }

  async function addTrip(){
    if (!newName.trim()||!newF1.trim()||!newF2.trim()) return;
    const id=newName.toLowerCase().replace(/[^a-z0-9]/g,"_")+"_"+Date.now();
    await db.collection("trips").doc(id).set({name:newName.trim(),currency:newCur,family1:newF1.trim(),family2:newF2.trim(),order:trips.length});
    setActiveIdx(trips.length); setView("home"); setNewName(""); setNewF1(""); setNewF2("");
  }

  async function delTrip(tripId){
    if (trips.length<=1) return;
    const snap=await db.collection("trips").doc(tripId).collection("entries").get();
    await Promise.all(snap.docs.map(d=>d.ref.delete()));
    await db.collection("trips").doc(tripId).delete();
    setActiveIdx(0);
  }

  const debtor   = stats&&stats.diff1Euro>0?trip?.family2:trip?.family1;
  const creditor = stats&&stats.diff1Euro>0?trip?.family1:trip?.family2;
  const debtEuro = stats?Math.abs(stats.diff1Euro):0;
  const f1Entries= tripEntries.filter(e=>trip&&e.payer===trip.family1);
  const f2Entries= tripEntries.filter(e=>trip&&e.payer!==trip.family1);

  if (loading) return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${BG},#152030,${BG})`,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <img src="/icon-512.png" style={{width:100,height:100,borderRadius:20,opacity:0.9}}/>
      <div style={{color:GOLD,fontSize:18,letterSpacing:3}}>Verbinde…</div>
    </div>
  );

  // ── NEUER URLAUB ──────────────────────────────────────────────
  if (view==="newtrip") return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${BG},#152030,${BG})`,padding:24}}>
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:36}}>
        <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:GOLD,fontSize:30,cursor:"pointer"}}>←</button>
        <div style={{fontSize:22,fontWeight:"bold",color:"#f5e6c8"}}>Neuer Urlaub</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:20,maxWidth:480,margin:"0 auto"}}>
        <div><label style={lbl}>Name</label><input placeholder="Griechenland 🇬🇷" value={newName} onChange={e=>setNewName(e.target.value)} style={inp}/></div>
        <div><label style={lbl}>Währung</label>
          <select value={newCur} onChange={e=>setNewCur(e.target.value)} style={inp}>
            {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.code} – {c.name} ({c.symbol})</option>)}
          </select>
        </div>
        <div><label style={lbl}>Familie 1</label><input placeholder="Graben" value={newF1} onChange={e=>setNewF1(e.target.value)} style={inp}/></div>
        <div><label style={lbl}>Familie 2</label><input placeholder="Bergmann" value={newF2} onChange={e=>setNewF2(e.target.value)} style={inp}/></div>
        <button onClick={addTrip} style={{background:`linear-gradient(135deg,${GOLD},#b8962e)`,border:"none",borderRadius:14,color:BG,fontWeight:"bold",fontSize:19,padding:"18px",cursor:"pointer",marginTop:8}}>
          Urlaub erstellen
        </button>
      </div>
    </div>
  );

  // ── ÜBERSICHT ─────────────────────────────────────────────────
  if (view==="table") return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${BG},#152030,${BG})`}}>
      <div style={{background:"rgba(0,0,0,0.45)",borderBottom:"1px solid rgba(212,175,55,0.2)",padding:"14px 20px",display:"flex",alignItems:"center",gap:14,position:"sticky",top:0,zIndex:10}}>
        <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:GOLD,fontSize:28,cursor:"pointer"}}>←</button>
        <div style={{flex:1}}>
          <div style={{fontSize:10,letterSpacing:3,color:GOLD,textTransform:"uppercase"}}>Übersicht</div>
          <div style={{fontSize:17,fontWeight:"bold",color:"#f5e6c8"}}>{trip?.name}</div>
        </div>
        <span style={{width:8,height:8,borderRadius:"50%",background:syncDot?"#4caf50":"#1a4a2a",display:"inline-block",transition:"background 0.4s"}}/>
      </div>

      <div style={{display:"flex",overflowX:"auto",background:"rgba(0,0,0,0.2)",borderBottom:"1px solid rgba(212,175,55,0.1)",padding:"0 16px"}}>
        {trips.map((t,i)=>(
          <div key={t.id} onClick={()=>setActiveIdx(i)} style={{padding:"11px 16px",cursor:"pointer",fontSize:14,borderBottom:i===activeIdx?`2px solid ${GOLD}`:"2px solid transparent",color:i===activeIdx?GOLD:"#6a5a4a",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:8}}>
            {t.name}
            {trips.length>1&&<span onClick={e=>{e.stopPropagation();if(window.confirm(`„${t.name}" löschen?`))delTrip(t.id)}} style={{fontSize:10,color:"#4a3a2a",cursor:"pointer"}}>✕</span>}
          </div>
        ))}
        <div onClick={()=>setView("newtrip")} style={{padding:"11px 16px",cursor:"pointer",fontSize:14,color:"#4a6a4a",whiteSpace:"nowrap"}}>+ Neu</div>
      </div>

      {trip&&stats&&(
        <div style={{padding:"16px 20px",maxWidth:800,margin:"0 auto"}}>
          <div style={{background:"rgba(212,175,55,0.08)",border:"1px solid rgba(212,175,55,0.28)",borderRadius:16,padding:"20px",marginBottom:20}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
              {[{label:trip.family1,val:stats.t1,color:"#5b9bd5"},{label:trip.family2,val:stats.t2,color:"#e8875a"},{label:"Gesamt",val:stats.total,color:GOLD}].map(s=>(
                <div key={s.label} style={{textAlign:"center"}}>
                  <div style={{fontSize:10,letterSpacing:2,color:"#7a6a5a",textTransform:"uppercase",marginBottom:4}}>{s.label}</div>
                  <div style={{fontSize:15,fontWeight:"bold",color:s.color}}>{cur.symbol} {fmtNum(s.val)}</div>
                  {trip.currency!=="EUR"&&<div style={{fontSize:10,color:"#6a5a4a",marginTop:2}}>{fmtEuro(s.val*cur.rate)}</div>}
                </div>
              ))}
            </div>
            <div style={{borderTop:"1px solid rgba(212,175,55,0.15)",paddingTop:14,textAlign:"center"}}>
              <div style={{fontSize:15,marginBottom:4}}>
                <span style={{color:"#e8875a",fontWeight:"bold"}}>{debtor}</span>
                <span style={{color:"#6a5a4a",margin:"0 10px"}}>schuldet</span>
                <span style={{color:"#5b9bd5",fontWeight:"bold"}}>{creditor}</span>
              </div>
              <div style={{color:GOLD,fontSize:28,fontWeight:"bold"}}>{fmtEuro(debtEuro)}</div>
            </div>
          </div>

          <button onClick={()=>setEditRates(!editRates)} style={{background:"transparent",border:"1px solid rgba(212,175,55,0.2)",borderRadius:10,color:GOLD,padding:"10px 16px",fontSize:13,cursor:"pointer",marginBottom:14}}>
            {editRates?"✓ Kurse schließen":"⚙ Wechselkurse anpassen"}
          </button>
          {editRates&&(
            <div style={{background:"rgba(212,175,55,0.06)",border:"1px solid rgba(212,175,55,0.15)",borderRadius:12,padding:"16px",marginBottom:16}}>
              <div style={{fontSize:10,letterSpacing:2,color:"#7a6a5a",textTransform:"uppercase",marginBottom:12}}>1 Einheit → € (nur lokal)</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                {CURRENCIES.filter(c=>c.code!=="EUR").map(c=>(
                  <div key={c.code} style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:GOLD,fontSize:13,minWidth:36}}>{c.code}</span>
                    <input type="number" value={rates[c.code]} step="0.000001"
                      onChange={e=>setRates({...rates,[c.code]:parseFloat(e.target.value)||0})}
                      style={{...inp,width:90,fontSize:13,padding:"8px 10px"}}/>
                  </div>
                ))}
              </div>
            </div>
          )}

          {[[trip.family1,f1Entries,"#5b9bd5"],[trip.family2,f2Entries,"#e8875a"]].map(([fam,ents,color])=>(
            <div key={fam} style={{background:"rgba(255,255,255,0.02)",border:`1px solid ${color}33`,borderRadius:14,overflow:"hidden",marginBottom:16}}>
              <div style={{background:`linear-gradient(90deg,${color}18,transparent)`,padding:"12px 18px",borderBottom:`1px solid ${color}22`,display:"flex",justifyContent:"space-between"}}>
                <span style={{fontWeight:"bold",color,fontSize:16}}>{fam}</span>
                <span style={{color,fontSize:15}}>{cur.symbol} {fmtNum(ents.reduce((s,e)=>s+e.amount,0))}</span>
              </div>
              {ents.length===0&&<div style={{padding:16,color:"#4a3a2a",textAlign:"center",fontSize:13}}>Keine Einträge</div>}
              {ents.map(e=>(
                <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:14}}>
                  <span style={{color:"#c8b898",flex:1}}>{e.desc}</span>
                  <span style={{color:"#e8dcc8",marginLeft:12,whiteSpace:"nowrap"}}>{cur.symbol} {e.amount.toLocaleString("de-DE")}</span>
                  <button onClick={()=>delEntry(trip.id,e.id)} style={{background:"none",border:"none",color:"#4a3a2a",cursor:"pointer",marginLeft:10,fontSize:16,padding:"2px 6px"}}>✕</button>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );

  // ── STARTSEITE ────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${BG},#152030,${BG})`,display:"flex",flexDirection:"column"}}>
      <div style={{background:"rgba(0,0,0,0.4)",borderBottom:"1px solid rgba(212,175,55,0.2)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <img src="/icon-512.png" style={{width:32,height:32,borderRadius:8}}/>
          <div style={{fontSize:10,letterSpacing:4,color:GOLD,textTransform:"uppercase"}}>Reisekasse</div>
          <span style={{width:7,height:7,borderRadius:"50%",background:syncDot?"#4caf50":"#1a4a2a",display:"inline-block",transition:"background 0.4s"}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setView("newtrip")} style={{background:"transparent",border:"1px solid rgba(212,175,55,0.3)",borderRadius:8,color:GOLD,padding:"8px 14px",fontSize:13,cursor:"pointer"}}>+ Urlaub</button>
          <button onClick={()=>setView("table")} style={{background:`linear-gradient(135deg,${GOLD},#b8962e)`,border:"none",borderRadius:8,color:BG,padding:"8px 14px",fontSize:13,fontWeight:"bold",cursor:"pointer"}}>Übersicht</button>
        </div>
      </div>

      <div style={{display:"flex",overflowX:"auto",background:"rgba(0,0,0,0.2)",borderBottom:"1px solid rgba(212,175,55,0.1)",padding:"0 16px"}}>
        {trips.map((t,i)=>(
          <div key={t.id} onClick={()=>setActiveIdx(i)} style={{padding:"10px 16px",cursor:"pointer",fontSize:14,borderBottom:i===activeIdx?`2px solid ${GOLD}`:"2px solid transparent",color:i===activeIdx?GOLD:"#6a5a4a",whiteSpace:"nowrap"}}>
            {t.name}
          </div>
        ))}
      </div>

      {trip&&stats&&(
        <div style={{flex:1,padding:"28px 20px",maxWidth:520,margin:"0 auto",width:"100%"}}>
          <div style={{background:"rgba(212,175,55,0.08)",border:"1px solid rgba(212,175,55,0.25)",borderRadius:18,padding:"20px 22px",marginBottom:32,textAlign:"center"}}>
            <div style={{fontSize:11,letterSpacing:3,color:"#7a6a5a",textTransform:"uppercase",marginBottom:10}}>Aktueller Stand · {trip.name}</div>
            <div style={{fontSize:16,marginBottom:6}}>
              <span style={{color:"#e8875a",fontWeight:"bold"}}>{debtor}</span>
              <span style={{color:"#6a5a4a",margin:"0 10px"}}>schuldet</span>
              <span style={{color:"#5b9bd5",fontWeight:"bold"}}>{creditor}</span>
            </div>
            <div style={{color:GOLD,fontSize:36,fontWeight:"bold"}}>{fmtEuro(debtEuro)}</div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:20}}>
            <div>
              <label style={lbl}>Was wurde bezahlt?</label>
              <input placeholder="z.B. Abendessen" value={newDesc} onChange={e=>setNewDesc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEntry()} style={{...inp,fontSize:20,padding:"18px 20px"}} autoComplete="off"/>
            </div>
            <div>
              <label style={lbl}>Betrag ({cur.symbol})</label>
              <input type="number" placeholder="0" value={newAmt} onChange={e=>setNewAmt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEntry()} style={{...inp,fontSize:30,padding:"18px 20px",fontWeight:"bold",color:GOLD}}/>
            </div>
            <div>
              <label style={lbl}>Bezahlt von</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                {[["f1",trip.family1,"#5b9bd5"],["f2",trip.family2,"#e8875a"]].map(([v,name,color])=>(
                  <button key={v} onClick={()=>setNewPayer(v)} style={{
                    background:newPayer===v?`${color}22`:"rgba(255,255,255,0.04)",
                    border:newPayer===v?`2px solid ${color}`:"2px solid rgba(255,255,255,0.08)",
                    borderRadius:14,color:newPayer===v?color:"#6a5a4a",
                    padding:"18px",fontSize:19,fontWeight:"bold",cursor:"pointer",transition:"all 0.2s"
                  }}>{name}</button>
                ))}
              </div>
            </div>
            <button onClick={addEntry} style={{background:`linear-gradient(135deg,${GOLD},#b8962e)`,border:"none",borderRadius:14,color:BG,fontWeight:"bold",fontSize:20,padding:"20px",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,175,55,0.25)",marginTop:4}}>
              + Eintrag hinzufügen
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
